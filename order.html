<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicious Bites | Order</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #fafafa;
    }

    /* Navbar */
    .navbar {
      background-color: #111;
    }
    .navbar a {
      color: white !important;
      font-weight: 500;
    }
    .navbar a:hover {
      color: #f0a500 !important;
    }

    /* Header */
    .hero-header {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://images.unsplash.com/photo-1601924638867-3ec3e0b52b9d?auto=format&fit=crop&w=1600&q=80') center/cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }
    .hero-header h1 {
      font-size: 3rem;
      font-weight: bold;
    }
    .hero-header p {
      color: #f0a500;
      font-size: 1.2rem;
    }

    /* Order Form */
    .order-section {
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 700px;
      margin: 50px auto;
      transition: transform 0.3s;
    }
    .order-section:hover {
      transform: translateY(-5px);
    }

    label {
      font-weight: 600;
    }

    .btn-submit {
      background-color: #f0a500;
      border: none;
      color: white;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s;
    }
    .btn-submit:hover {
      background-color: #d48806;
    }

    .thank-you {
      display: none;
      text-align: center;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">🍔 Delicious Bites</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="order.html">Order</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Header -->
  <section class="hero-header">
    <h1>Place Your Order 🛒</h1>
    <p>We’ll deliver your favorite meal right to your doorstep!</p>
  </section>

  <!-- Order Form -->
  <div class="order-section">
    <form id="orderForm">
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="Enter your name" required>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" placeholder="07XXXXXXXX" required>
      </div>

      <div class="mb-3">
        <label for="address" class="form-label">Delivery Address</label>
        <textarea class="form-control" id="address" rows="3" placeholder="Enter your delivery address" required></textarea>
      </div>

      <div class="mb-3">
        <label for="foodItem" class="form-label">Select Your Dish</label>
        <select class="form-select" id="foodItem" required>
          <option value="">-- Choose a Dish --</option>
          <option>Cheese Burger - Rs.850</option>
          <option>Chicken Fried Rice - Rs.700</option>
          <option>Seafood Pizza - Rs.1200</option>
          <option>Italian Pasta - Rs.950</option>
          <option>Chocolate Dessert - Rs.600</option>
          <option>Fresh Salad - Rs.550</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="quantity" class="form-label">Quantity</label>
        <input type="number" class="form-control" id="quantity" min="1" value="1" required>
      </div>

      <div class="text-center">
        <button type="submit" class="btn-submit">Place Order</button>
      </div>
    </form>

    <div class="thank-you" id="thankYouMessage">
      <h4>✅ Thank you for your order!</h4>
      <p>We’ll start preparing it right away 🍽️</p>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Simple Script for Confirmation -->
  <script>
    const orderForm = document.getElementById('orderForm');
    const thankYouMessage = document.getElementById('thankYouMessage');

    orderForm.addEventListener('submit', function(e) {
      e.preventDefault(); // Prevent page reload
      orderForm.style.display = 'none';
      thankYouMessage.style.display = 'block';
    });
  </script>

</body>
</html>
