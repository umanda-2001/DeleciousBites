<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicious Bites | Contact</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #fafafa;
      margin: 0;
    }

    /* Navbar */
    .navbar {
      background-color: #111;
    }
    .navbar a {
      color: white !important;
      font-weight: 500;
    }
    .navbar a:hover {
      color: #f0a500 !important;
    }

    /* Hero Section */
    .hero-header {
      background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                  url('https://images.unsplash.com/photo-1600891964599-f61ba0e24092?auto=format&fit=crop&w=1600&q=80') center/cover;
      color: white;
      text-align: center;
      padding: 100px 20px;
    }
    .hero-header h1 {
      font-size: 3rem;
      font-weight: bold;
    }
    .hero-header p {
      color: #f0a500;
      font-size: 1.2rem;
    }

    /* Contact Form Section */
    .contact-section {
      background-color: white;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      padding: 40px;
      max-width: 900px;
      margin: 50px auto;
    }

    label {
      font-weight: 600;
    }

    .btn-send {
      background-color: #f0a500;
      border: none;
      color: white;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s;
    }

    .btn-send:hover {
      background-color: #d48806;
    }

    /* Contact Info */
    .info-box {
      background-color: #fff8e1;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 40px;
    }
    .info-box h5 {
      color: #f0a500;
      margin-bottom: 10px;
    }

    /* Map */
    iframe {
      border-radius: 12px;
      width: 100%;
      height: 300px;
      margin-top: 30px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">🍔 Delicious Bites</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="order.html">Order</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Hero Header -->
  <section class="hero-header">
    <h1>Contact Us ☎️</h1>
    <p>We’d love to hear from you!</p>
  </section>

  <!-- Contact Form -->
  <div class="contact-section">
    <div class="row">
      <div class="col-md-6">
        <h3 class="mb-4 text-center text-md-start">Send Us a Message 💬</h3>
        <form id="contactForm">
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" placeholder="Your name" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com" required>
          </div>

          <div class="mb-3">
            <label for="message" class="form-label">Your Message</label>
            <textarea class="form-control" id="message" rows="4" placeholder="Type your message here..." required></textarea>
          </div>

          <button type="submit" class="btn-send">Send Message</button>
        </form>

        <div class="thank-you mt-3 text-center text-success fw-bold" id="thankYouMessage" style="display:none;">
          ✅ Your message has been sent successfully!
        </div>
      </div>

      <div class="col-md-6">
        <div class="info-box">
          <h5>📍 Visit Us</h5>
          <p>No. 123, Main Street, Colombo, Sri Lanka</p>

          <h5>🕒 Opening Hours</h5>
          <p>Mon - Sun: 10 AM - 10 PM</p>

          <h5>📞 Call Us</h5>
          <p>+94 71 234 5678</p>
        </div>

        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d31693.161659315178!2d79.8551667!3d6.9270786!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3ae2595d9d3d1b37%3A0x7a84520fdb5cf71d!2sColombo!5e0!3m2!1sen!2slk!4v1697450000000!5m2!1sen!2slk"
          allowfullscreen=""
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS for Form -->
  <script>
    const contactForm = document.getElementById('contactForm');
    const thankYouMessage = document.getElementById('thankYouMessage');

    contactForm.addEventListener('submit', function(e) {
      e.preventDefault();
      contactForm.reset();
      thankYouMessage.style.display = 'block';
    });
  </script>

</body>
</html>
